<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Executive Dashboard</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f5f5f5;
        color: #1a1a1a;
        min-height: 100vh;
      }
      #root {
        max-width: 960px;
        margin: 0 auto;
        padding: 24px 20px;
      }
      :root {
        --color-background-primary: #ffffff;
        --color-background-secondary: #f1efea;
        --color-background-info: #e6f1fb;
        --color-background-success: #eaf3de;
        --color-background-warning: #faeeda;
        --color-background-danger: #fcebeb;
        --color-text-primary: #1a1a1a;
        --color-text-secondary: #6b6b6b;
        --color-text-info: #185fa5;
        --color-text-success: #3b6d11;
        --color-text-warning: #854f0b;
        --color-text-danger: #a32d2d;
        --color-border-tertiary: rgba(0,0,0,0.12);
        --color-border-secondary: rgba(0,0,0,0.22);
        --color-border-info: #85b7eb;
        --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        --border-radius-md: 8px;
        --border-radius-lg: 12px;
      }
      @media (prefers-color-scheme: dark) {
        body { background: #1c1c1a; color: #e0ddd6; }
        :root {
          --color-background-primary: #2a2a28;
          --color-background-secondary: #232321;
          --color-background-info: #042c53;
          --color-background-success: #173404;
          --color-background-warning: #412402;
          --color-background-danger: #501313;
          --color-text-primary: #e0ddd6;
          --color-text-secondary: #9c9a92;
          --color-text-info: #85b7eb;
          --color-text-success: #97c459;
          --color-text-warning: #ef9f27;
          --color-text-danger: #f09595;
          --color-border-tertiary: rgba(255,255,255,0.1);
          --color-border-secondary: rgba(255,255,255,0.2);
          --color-border-info: #185fa5;
        }
      }
      input[type="number"], input[type="text"] {
        border: 0.5px solid var(--color-border-secondary);
        border-radius: var(--border-radius-md);
        padding: 7px 10px;
        font-size: 13px;
        width: 100%;
        background: var(--color-background-primary);
        color: var(--color-text-primary);
        outline: none;
        font-family: var(--font-sans);
      }
      input:focus { border-color: var(--color-text-info); }
      button { font-family: var(--font-sans); cursor: pointer; }
      input[type="number"]::-webkit-inner-spin-button { opacity: 0.4; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
